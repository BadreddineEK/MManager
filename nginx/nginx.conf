# ─────────────────────────────────────────────────────────────────────────────
# Nginx — Mosquée Manager (prod)
#
# Rôle :
#   - Sert le frontend (index.html + assets) depuis /usr/share/nginx/html
#   - Proxy toutes les requêtes /api/ et /admin/ vers backend-prod:8000
#   - Sert les fichiers statiques Django depuis /staticfiles/
#
# Ce fichier est monté en lecture seule dans le conteneur nginx.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Compression gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    # ── Fichiers statiques Django (/static/) ──────────────────────────────────
    location /static/ {
        alias /usr/share/nginx/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── API Django (/api/ + /admin/ + /health/) ──────────────────────────────
    location ~ ^/(api|admin|health)/ {
        proxy_pass         http://backend-prod:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
        proxy_pass_header  Set-Cookie;

        # Nécessaire pour les uploads (import backup ZIP)
        client_max_body_size 50M;
        proxy_read_timeout   120s;
    }

    # ── Frontend SPA (tout le reste → index.html) ────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        # SPA : toujours servir index.html (pas de routes serveur)
        try_files $uri $uri/ /index.html;

        # Désactiver le cache sur index.html (le reste peut être mis en cache)
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
