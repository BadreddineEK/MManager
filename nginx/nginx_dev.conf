# ─────────────────────────────────────────────────────────────────────────────
# Nginx DEV — Nidham SaaS  (port 8080)
# ─────────────────────────────────────────────────────────────────────────────

# ── Domaine RACINE : portal ───────────────────────────────────────────────────
server {
    listen 8080;
    server_name nidham.local;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # API onboarding (accès depuis le portail)
    location ~ ^/(api|onboarding|nidham-admin|health)/ {
        proxy_pass         http://backend_dev:8100;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
        proxy_read_timeout   60s;
    }

    # Frontend portail
    location / {
        root  /usr/share/nginx/html;
        index portal.html;
        try_files $uri $uri/ /portal.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}

# ── Sous-domaines MOSQUÉES : app ──────────────────────────────────────────────
server {
    listen 8080;
    server_name ~^(?<slug>.+)\.nidham\.local$;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    root /usr/share/nginx/html;

    # API tenant → backend Django
    location ~ ^/(api|nidham-admin|health|admin|static)/ {
        proxy_pass         http://backend_dev:8100;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
        proxy_read_timeout   60s;
    }

    # /app/ et /app/* → toujours index.html (SPA)
    location /app {
        try_files /index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Fichiers statiques (css/, js/, etc.)
    location ~* \.(css|js|png|jpg|ico|woff2?|ttf|svg)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # Racine → index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
