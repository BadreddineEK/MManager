# ─────────────────────────────────────────────────────────────────────────────
# Nginx DEV — Nidham SaaS
#
# Port 8080 en dev (8100 réservé au backend Django)
#
# Logique :
#   - nidham.local:8080           → portal.html  (landing / passerelle)
#   - *.nidham.local:8080         → index.html   (app mosquée)
#   - /api/ /nidham-admin/        → proxy backend_dev:8100
# ─────────────────────────────────────────────────────────────────────────────

# ── Domaine RACINE : portal ───────────────────────────────────────────────────
server {
    listen 8080;
    server_name nidham.local;

    access_log /var/log/nginx/portal_access.log;
    error_log  /var/log/nginx/portal_error.log warn;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # ── API onboarding (accès depuis le portail) ──────────────────────────
    location ~ ^/(api|onboarding|nidham-admin|health)/ {
        proxy_pass         http://backend_dev:8100;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Access-Control-Allow-Origin *;
        add_header         Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE";
        add_header         Access-Control-Allow-Headers "Authorization, Content-Type";
        client_max_body_size 50M;
        proxy_read_timeout   60s;
    }

    # ── Frontend portail ──────────────────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index portal.html;
        try_files $uri $uri/ /portal.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}

# ── Sous-domaines MOSQUÉES : app ──────────────────────────────────────────────
server {
    listen 8080;
    server_name ~^(?<slug>.+)\.nidham\.local$;

    access_log /var/log/nginx/app_access.log;
    error_log  /var/log/nginx/app_error.log warn;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # ── API tenant ────────────────────────────────────────────────────────
    location ~ ^/(api|nidham-admin|health|admin|static)/ {
        proxy_pass         http://backend_dev:8100;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
        proxy_read_timeout   60s;
    }

    # ── App mosquée ───────────────────────────────────────────────────────
    location /app/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Racine → app (compatibilité) ──────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}

