# ─────────────────────────────────────────────────────────────────────────────
# Nidham DEV — docker-compose.dev.yml
# Usage : docker compose -f docker-compose.dev.yml up -d
# Port 8100 (dev) — séparé de la prod (port 80)
# BDD séparée : nidham_dev sur port 5433
# Nginx dev port 8080 — sert portal.html + proxy API
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 16 DEV ──────────────────────────────────────────────────────────
  db_dev:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nidham_dev
      POSTGRES_USER: nidham
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nidham -d nidham_dev"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Backend Django DEV (runserver + hot-reload) ───────────────────────────────────
  backend_dev:
    build: ./backend
    restart: unless-stopped
    entrypoint: ["/app/entrypoint.dev.sh"]
    command: python manage.py runserver 0.0.0.0:8100
    env_file:
      - .env.dev
    depends_on:
      db_dev:
        condition: service_healthy
    ports:
      - "8100:8100"
    volumes:
      - ./backend:/app

  # ── Nginx DEV — sert portal.html + proxy API ─────────────────────────────
  nginx_dev:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx_dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "8080:8080"
    depends_on:
      - backend_dev

  # ── Cron DEV — expire trials chaque nuit a 01h00 ─────────────────────────────
  cron_dev:
    build: ./backend
    restart: unless-stopped
    entrypoint: ["/app/entrypoint.dev.sh"]
    command: >
      sh -c "echo '0 1 * * * cd /app && python manage.py expire_trials >> /tmp/cron.log 2>&1' | crontab - && crond -f -l 8"
    env_file:
      - .env.dev
    depends_on:
      db_dev:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  postgres_dev_data:
