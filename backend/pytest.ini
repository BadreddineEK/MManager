[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = tests.py test_*.py *_test.py
python_classes = Test*
python_functions = test_*
# Répertoire de base pour la découverte des tests
testpaths = .

# Affichage : verbose par défaut + durée des tests lents
addopts =
    -v
    --tb=short
    --durations=10
    --no-header
