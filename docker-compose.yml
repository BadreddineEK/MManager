# ─────────────────────────────────────────────────────────────────────────────
# Mosquée Manager — Docker Compose
# Usage :
#   Dev local  : docker compose up -d
#   Prod       : docker compose --profile prod up -d
#
# Variables requises : voir .env.example → copier en .env et adapter
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    # Port 5432 NON exposé en prod — accès interne Docker uniquement
    # Décommenter uniquement pour debug local :
    # ports:
    #   - "5432:5432"

  # ── Backend Django — DEV (runserver + hot-reload) ─────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # Hot-reload en dev
      - static_files:/app/staticfiles

  # ── Backend Django — PROD (gunicorn, adapté Raspberry Pi) ───────────────────
  backend-prod:
    build: ./backend
    restart: unless-stopped
    command: >
      gunicorn config.wsgi:application
        --bind 0.0.0.0:8000
        --workers 2
        --threads 4
        --worker-class gthread
        --timeout 120
        --access-logfile -
        --error-logfile -
        --log-level info
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles
    profiles:
      - prod

  # ── Nginx — sert le frontend + proxy vers backend-prod ───────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - static_files:/usr/share/nginx/staticfiles:ro
    ports:
      - "80:80"
    depends_on:
      - backend-prod
    profiles:
      - prod

  # ── Cloudflare Tunnel (prod uniquement) ──────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    profiles:
      - prod

  # ── Backup one-shot (manuel : docker compose run backup) ────────────────────
  backup:
    image: postgres:16-alpine
    restart: "no"
    entrypoint: ["sh", "-c", "apk add --no-cache openssl && /scripts/backup.sh"]
    env_file:
      - .env
    volumes:
      - ./backups:/backups
      - ./scripts:/scripts
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - prod

  # ── Backup cron quotidien (prod uniquement) ───────────────────────────────────
  backup-cron:
    image: postgres:16-alpine
    restart: unless-stopped
    entrypoint:
      - sh
      - -c
      - |
        apk add --no-cache openssl
        echo "0 2 * * * /scripts/backup.sh >> /backups/backup.log 2>&1" | crontab -
        crond -f -l 8
    env_file:
      - .env
    volumes:
      - ./backups:/backups
      - ./scripts:/scripts
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - prod

volumes:
  postgres_data:
  static_files:
